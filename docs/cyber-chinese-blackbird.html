<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinese Blackbird</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #f5f2eb; overflow: hidden; }
canvas { display: block; }
#label {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Georgia', serif;
  font-size: 11px;
  font-style: italic;
  color: #b8b0a2;
  letter-spacing: 1.5px;
  pointer-events: none;
  user-select: none;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="label">Turdus mandarinus &nbsp;·&nbsp; Chinese Blackbird</div>
<script>
// ─── Setup ────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width  = window.innerWidth  * devicePixelRatio;
  H = canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width  = window.innerWidth  + 'px';
  canvas.style.height = window.innerHeight + 'px';
}
resize();
window.addEventListener('resize', resize);

const DPR = devicePixelRatio;
const S = 4 * DPR; // 1 art-pixel = S screen pixels

// ─── Pixel rect helper ────────────────────────────────────
// Draws at art-pixel coords. Origin is set by the caller via ctx.translate.
// Positive y is DOWN in canvas space (standard).
function px(ax, ay, aw, ah, col) {
  ctx.fillStyle = col;
  ctx.fillRect(
    Math.round(ax * S),
    Math.round(ay * S),
    Math.round(aw * S),
    Math.round(ah * S)
  );
}

// ─── Palette ──────────────────────────────────────────────
const K = {
  b0: '#0b0907',   // deepest body
  b1: '#131009',   // main body
  b2: '#1c1610',   // slightly lighter body
  b3: '#242019',   // sheen highlight area
  b4: '#2d2820',   // brightest feather sheen
  bl: '#e07a00',   // bill upper / bright
  bm: '#b86300',   // bill mid
  bd: '#7a4200',   // bill lower dark
  er: '#bf6700',   // eye ring (orbital)
  ep: '#050303',   // pupil
  es: '#fffae0',   // eye specular
  lg: '#2e2618',   // leg / foot
};

// ─── Bird drawing ─────────────────────────────────────────
// All coordinates in art-pixels. Origin = top-left of bounding box.
// Bird bounding box ≈ 26 wide × 18 tall (facing right)
// We set origin such that foot-ground is at art y=17, center-x ≈ 11

//  Sprite defined as rows of [ax, ay, aw, ah, colorKey]
//  Y increases downward (standard canvas), so small y = top of bird.

const SPRITE_BASE = [
  // ── tail (left side, rows 7–14) ──────────────────────
  [0, 7,  3, 1, 'b0'],
  [0, 8,  4, 1, 'b1'],
  [0, 9,  4, 1, 'b1'],
  [1,10,  3, 1, 'b1'],
  [1,11,  3, 1, 'b0'],
  [2,12,  2, 1, 'b0'],

  // ── body (rows 5–15) ──────────────────────────────────
  [ 4, 5, 12, 1, 'b1'],
  [ 3, 6, 13, 1, 'b1'],
  [ 3, 7, 13, 1, 'b1'],
  [ 3, 8, 13, 1, 'b2'],
  [ 3, 9, 13, 1, 'b2'],
  [ 3,10, 13, 1, 'b2'],
  [ 3,11, 13, 1, 'b2'],
  [ 3,12, 12, 1, 'b1'],
  [ 4,13, 10, 1, 'b1'],
  [ 5,14,  8, 1, 'b0'],

  // ── wing sheen (top-left of body area) ────────────────
  [ 4, 6,  5, 1, 'b3'],
  [ 4, 7,  4, 1, 'b3'],
  [ 4, 8,  3, 1, 'b4'],
  [ 5, 9,  2, 1, 'b3'],

  // ── belly lighter patch ───────────────────────────────
  [ 9,10,  4, 1, 'b3'],
  [ 9,11,  4, 1, 'b3'],
  [ 9,12,  3, 1, 'b2'],

  // ── neck / head connect ───────────────────────────────
  [12, 4,  5, 1, 'b1'],
  [12, 5,  5, 1, 'b1'],

  // ── head (rows 0–6) ───────────────────────────────────
  [11, 0,  7, 1, 'b1'],
  [10, 1,  9, 1, 'b2'],
  [10, 2,  9, 1, 'b2'],
  [10, 3,  8, 1, 'b2'],
  [11, 4,  6, 1, 'b1'],
  [12, 5,  4, 1, 'b0'],

  // ── head sheen ────────────────────────────────────────
  [12, 1,  3, 1, 'b3'],
  [12, 2,  2, 1, 'b3'],
];

// Bill — Chinese blackbird: stout at base, upper culmen curves down, slight hook at tip
// Profile (facing right):  top ridge (2px), main body (4px), lower + hook tip (3+1px)
const BILL_UPPER = [
  [20, 2,  2, 1, 'bl'],   // top ridge of culmen (slightly elevated above lower mandible join)
  [19, 3,  4, 1, 'bl'],   // main upper mandible — full width from face to tip
  [22, 4,  1, 1, 'bm'],   // hook: tip of upper mandible curves 1 row below the body
];
// Lower mandible: straight, shorter, tucked under upper
const BILL_LOWER = [
  [19, 4,  3, 1, 'bm'],   // lower body (3px, ends before the upper hook)
];

// Eye at art-pixel position relative to sprite origin
const EYE = { ax: 15, ay: 2 }; // top-left of eye area

// Leg art-pixel positions (x) and ground y
const LEGS = [
  { ax: 9  }, // left leg
  { ax: 12 }, // right leg
];
const FOOT_Y = 15; // art-pixel y where feet start (= ground)
const LEG_TOP = 14; // art-pixel y of leg top (body bottom)

// wingFlapAngle: null = grounded, -1..1 = flying (1=up, -1=down)
function drawBird(bx, by, facingRight, peckDip, beakOpen, legPhase, fluffScale, wingFlapAngle) {
  ctx.save();

  const flying = wingFlapAngle !== null && wingFlapAngle !== undefined;
  const originX = bx - (facingRight ? 11 : 15) * S;
  const originY = by - FOOT_Y * S;

  if (!facingRight) {
    ctx.translate(originX + 13 * S, 0);
    ctx.scale(-1, 1);
    ctx.translate(-originX - 13 * S, 0);
  }

  ctx.translate(0, peckDip * S);

  if (fluffScale !== 1) {
    const cx = originX + 8 * S, cy = originY + 8 * S;
    ctx.translate(cx, cy);
    ctx.scale(fluffScale, fluffScale);
    ctx.translate(-cx, -cy);
  }

  // ── Flying wings (drawn behind body) ──────────────────
  if (flying) {
    // Wing root is at body left-mid, roughly (ox+3, oy+8) in art coords
    // 4 segments extending further left, each with y animated by flapAngle
    // Tip moves most, root barely moves
    const bodyMidY = originY / S + 8;
    const rootX = originX / S + 3;
    // Segment config: [x_offset_from_root, flapMultiplier, width, color]
    const segs = [
      [ -1, 0.1, 3, 'b2'],  // innermost (barely moves)
      [ -3, 0.35, 3, 'b1'],  // inner-mid
      [ -6, 0.65, 3, 'b1'],  // outer-mid
      [ -9, 1.0,  3, 'b0'],  // tip (moves most)
    ];
    for (const [dx, mult, w, c] of segs) {
      const wy = bodyMidY - wingFlapAngle * 4.5 * mult;
      px(rootX + dx, wy, w, 1, K[c]);
      px(rootX + dx, wy + 1, w - 1, 1, K[c]); // give feather some thickness
    }
  }

  // ── Legs (tucked when flying) ──────────────────────────
  if (!flying) {
    const legStep = [
      Math.max(0,  Math.sin(legPhase) * 1.5),
      Math.max(0, -Math.sin(legPhase) * 1.5),
    ];
    for (let i = 0; i < 2; i++) {
      const lx = originX + LEGS[i].ax * S;
      const topY = originY + (LEG_TOP - legStep[i]) * S;
      const botY = originY + FOOT_Y * S;
      ctx.fillStyle = K.lg;
      ctx.fillRect(lx, topY, S, botY - topY);
      ctx.fillRect(lx - S, botY, 3 * S, Math.round(0.8 * S));
      ctx.fillRect(lx, botY - Math.round(0.8 * S), S, Math.round(0.8 * S));
    }
  } else {
    // Tucked legs: just short stubs under body
    for (let i = 0; i < 2; i++) {
      const lx = originX + LEGS[i].ax * S;
      const stubY = originY + (LEG_TOP + 1) * S;
      ctx.fillStyle = K.lg;
      ctx.fillRect(lx, stubY, S, 2 * S);
    }
  }

  // ── Base sprite ───────────────────────────────────────
  for (const [ax, ay, aw, ah, c] of SPRITE_BASE) {
    px(originX / S + ax, originY / S + ay, aw, ah, K[c]);
  }

  // ── Bill upper ────────────────────────────────────────
  for (const [ax, ay, aw, ah, c] of BILL_UPPER) {
    px(originX / S + ax, originY / S + ay, aw, ah, K[c]);
  }

  // ── Bill lower (shifts down when open) ───────────────
  const billShift = beakOpen * 1.5;
  for (const [ax, ay, aw, ah, c] of BILL_LOWER) {
    px(originX / S + ax, originY / S + ay + billShift, aw, ah, K[c]);
  }

  // ── Eye ring ──────────────────────────────────────────
  const ex = originX / S + EYE.ax;
  const ey = originY / S + EYE.ay;
  px(ex - 1, ey - 1, 3, 3, K.er);
  px(ex - 1, ey - 1, 2, 2, K.ep);
  px(ex, ey - 1, 1, 1, K.es);

  ctx.restore();
}

// ─── Ground shadow ────────────────────────────────────────
function drawShadow(bx, by) {
  const grd = ctx.createRadialGradient(bx, by + 2 * DPR, 0, bx, by + 2 * DPR, 18 * S);
  grd.addColorStop(0,   'rgba(0,0,0,0.07)');
  grd.addColorStop(0.4, 'rgba(0,0,0,0.03)');
  grd.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.save();
  ctx.translate(bx, by + 2 * DPR);
  ctx.scale(1, 0.25);
  ctx.beginPath();
  ctx.arc(0, 0, 18 * S, 0, Math.PI * 2);
  ctx.fillStyle = grd;
  ctx.fill();
  ctx.restore();
}

// ─── Musical notes ────────────────────────────────────────
const notes = [];

function spawnNote(x, y) {
  notes.push({
    x, y,
    vx: (Math.random() - 0.3) * 0.6 * DPR,
    vy: -(1.2 + Math.random() * 0.8) * DPR,
    life: 1,
    char: Math.random() < 0.5 ? '♪' : '♩',
    size: (11 + Math.random() * 6) * DPR,
    rot: (Math.random() - 0.5) * 0.4,
  });
}

function updateNotes() {
  for (let i = notes.length - 1; i >= 0; i--) {
    const n = notes[i];
    n.x  += n.vx;
    n.y  += n.vy;
    n.vy *= 0.98;
    n.life -= 0.006;
    if (n.life <= 0) notes.splice(i, 1);
  }
}

function drawNotes() {
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (const n of notes) {
    ctx.globalAlpha = n.life * 0.5;
    ctx.font = `${n.size}px Georgia, serif`;
    ctx.fillStyle = '#6a5e50';
    ctx.save();
    ctx.translate(n.x, n.y);
    ctx.rotate(n.rot * (1 - n.life));
    ctx.fillText(n.char, 0, 0);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ─── Ground line ──────────────────────────────────────────
function drawGround(gy) {
  const grd = ctx.createLinearGradient(0, gy, 0, gy + 20 * DPR);
  grd.addColorStop(0, 'rgba(0,0,0,0.05)');
  grd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, gy, W, 20 * DPR);
}

// ─── Bird state machine ───────────────────────────────────
const GROUND_Y_FRAC = 0.58; // fraction of screen height

const bird = {
  x: W * 0.5,
  get y() { return H * GROUND_Y_FRAC; },

  state: 'idle',
  stateTime: 0,
  stateDur: 100,

  // movement
  vx: 0,
  facingRight: true,

  // animation
  legPhase: 0,
  peckDip: 0,
  beakOpen: 0,
  fluffScale: 1.0,
  headBob: 0,       // vertical offset for head-bob during walk

  // sing
  noteTimer: 0,

  // fly
  wingFlapAngle: null, // null = grounded
  flyT: 0,

  // blink
  blinkTimer: 0,
  blinking: false,
};

function pickState() {
  const w = { walk: 32, idle: 22, peck: 16, sing: 10, hop: 5, pause: 5, fly: 10 };
  let r = Math.random() * Object.values(w).reduce((a, b) => a + b, 0);
  for (const [s, v] of Object.entries(w)) { r -= v; if (r <= 0) return s; }
  return 'idle';
}

function enterState(s) {
  bird.state = s;
  bird.stateTime = 0;
  bird.stateDur = {
    walk:  90 + Math.random() * 200,
    idle:  40 + Math.random() * 60,
    peck:  50 + Math.random() * 70,
    sing: 100 + Math.random() * 140,
    hop:   25,
    pause: 20 + Math.random() * 40,
    fly:  160 + Math.random() * 80,  // long enough to cross significant distance
  }[s] || 80;

  if (s === 'walk') {
    if (Math.random() < 0.45) bird.facingRight = !bird.facingRight;
    bird.vx = (0.8 + Math.random() * 0.7) * DPR * (bird.facingRight ? 1 : -1);
  }
  if (s === 'hop') {
    bird.hopVy = -(4 + Math.random() * 2) * DPR;
    bird.hopY  = H * GROUND_Y_FRAC;
    if (Math.random() < 0.4) bird.facingRight = !bird.facingRight;
    bird.vx = (1.2 + Math.random()) * DPR * (bird.facingRight ? 1 : -1);
  }
  if (s === 'look' || s === 'pause') {
    if (Math.random() < 0.5) bird.facingRight = !bird.facingRight;
  }
  if (s === 'fly') {
    // Always fly toward the opposite side of the screen for drama
    bird.facingRight = bird.x < W * 0.5;
    bird.vx = (3.5 + Math.random() * 1.5) * DPR * (bird.facingRight ? 1 : -1);
    bird.flyT = 0;
    bird.wingFlapAngle = 0;
  } else {
    bird.wingFlapAngle = null;
  }
}

let hopY = 0;
let hopVy = 0;
let currentY = 0;

function updateBird() {
  const s = bird.state;
  bird.stateTime++;
  const t = bird.stateTime;
  const margin = 60 * DPR;
  const gy = H * GROUND_Y_FRAC;

  // ── Blink (independent) ─────────────────────────────
  bird.blinkTimer++;
  if (!bird.blinking && bird.blinkTimer > 180 + Math.random() * 240) {
    bird.blinking  = true;
    bird.blinkTimer = 0;
  } else if (bird.blinking && bird.blinkTimer > 6) {
    bird.blinking  = false;
    bird.blinkTimer = 0;
  }

  // ── WALK ────────────────────────────────────────────
  if (s === 'walk') {
    bird.x += bird.vx;
    bird.legPhase += 0.2;
    bird.headBob = Math.sin(bird.legPhase) * 0.6; // slight bob up/down

    if (bird.x < margin)     { bird.x = margin;     bird.vx = Math.abs(bird.vx);  bird.facingRight = true;  }
    if (bird.x > W - margin) { bird.x = W - margin; bird.vx = -Math.abs(bird.vx); bird.facingRight = false; }
    currentY = gy;
  }

  // ── IDLE ────────────────────────────────────────────
  else if (s === 'idle') {
    bird.legPhase = 0;
    bird.headBob  = Math.sin(t * 0.03) * 0.25;
    currentY = gy;
  }

  // ── PECK ────────────────────────────────────────────
  else if (s === 'peck') {
    const cycle = Math.sin(t * 0.22);
    bird.peckDip  = Math.max(0, cycle) * 2.5;
    bird.headBob  = 0;
    bird.legPhase = 0;
    currentY = gy;
  }

  // ── SING ────────────────────────────────────────────
  else if (s === 'sing') {
    bird.beakOpen = 0.5 + Math.sin(t * 0.28) * 0.5;
    bird.headBob  = 1.2 + Math.sin(t * 0.1) * 0.4; // head up
    bird.legPhase = 0;
    bird.noteTimer++;
    if (bird.noteTimer % 24 === 0) {
      const dir = bird.facingRight ? 1 : -1;
      spawnNote(bird.x + dir * 14 * S, currentY - 16 * S);
    }
    currentY = gy;
  }

  // ── HOP ─────────────────────────────────────────────
  else if (s === 'hop') {
    if (t === 1) { hopY = gy; hopVy = -(4 + Math.random() * 2) * DPR; }
    hopVy  += 0.35 * DPR;
    hopY   += hopVy;
    bird.x += bird.vx;
    bird.legPhase += 0.25;
    if (hopY >= gy) { hopY = gy; hopVy = 0; bird.stateTime = bird.stateDur; }
    currentY = hopY;
  }

  // ── FLY ──────────────────────────────────────────────
  else if (s === 'fly') {
    bird.flyT++;
    const dur   = bird.stateDur;
    const frac  = t / dur; // 0 → 1 across the whole flight

    // Altitude curve: rise first third, cruise middle, descend last third
    let altFrac;
    if      (frac < 0.25) altFrac = frac / 0.25;           // take-off ramp
    else if (frac < 0.75) altFrac = 1.0;                   // cruise
    else                  altFrac = 1.0 - (frac - 0.75) / 0.25; // landing ramp
    altFrac = Math.max(0, altFrac);

    const cruiseAlt = H * 0.30;   // screen height at cruise
    const targetY   = gy - altFrac * (gy - cruiseAlt); // y decreases = goes up
    currentY = targetY;

    // Horizontal movement
    bird.x += bird.vx;

    // Wing flap — faster during climb/descent, steady at cruise
    const flapSpeed = (altFrac < 0.9) ? 0.22 : 0.28;
    bird.wingFlapAngle = Math.sin(bird.flyT * flapSpeed);

    // Subtle altitude bobble during cruise
    if (frac > 0.25 && frac < 0.75) {
      currentY += Math.sin(bird.flyT * 0.06) * 3 * DPR;
    }

    // Wrap around screen edges (bird flies off one side, appears other)
    const flyMargin = 80 * DPR;
    if (bird.x > W + flyMargin)  bird.x = -flyMargin;
    if (bird.x < -flyMargin)     bird.x = W + flyMargin;

    // End state when close to ground again
    if (frac >= 1.0 || (frac > 0.85 && currentY >= gy - 2 * DPR)) {
      currentY = gy;
      bird.stateTime = bird.stateDur;
    }
  }

  // ── PAUSE ────────────────────────────────────────────
  else {
    bird.legPhase = 0;
    bird.headBob  = 0;
    currentY = gy;
  }

  // Smooth decay of peck/beak
  if (s !== 'peck') bird.peckDip  = Math.max(0, bird.peckDip  - 0.25);
  if (s !== 'sing') bird.beakOpen = Math.max(0, bird.beakOpen - 0.08);
  if (s !== 'sing') bird.headBob  = bird.headBob * 0.9;

  // Fluff pulse in idle/sing
  bird.fluffScale = (s === 'idle' || s === 'sing')
    ? 1 + Math.sin(t * 0.05) * 0.012
    : 1.0;

  // Transition
  if (bird.stateTime >= bird.stateDur) enterState(pickState());
}

// ─── Main loop ────────────────────────────────────────────
function loop() {
  const gy = H * GROUND_Y_FRAC;

  // Background
  ctx.fillStyle = '#f5f2eb';
  ctx.fillRect(0, 0, W, H);

  // Ground strip
  drawGround(gy);

  updateBird();
  updateNotes();

  // Shadow
  drawShadow(bird.x, currentY);

  // Bird
  const drawY = currentY - bird.headBob * S;
  drawBird(
    bird.x,
    drawY,
    bird.facingRight,
    bird.peckDip,
    bird.beakOpen,
    bird.legPhase,
    bird.fluffScale,
    bird.wingFlapAngle
  );

  drawNotes();

  requestAnimationFrame(loop);
}

// ─── Start ────────────────────────────────────────────────
currentY = H * GROUND_Y_FRAC;
enterState('idle');
requestAnimationFrame(loop);
</script>
</body>
</html>
